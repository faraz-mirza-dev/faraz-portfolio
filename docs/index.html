    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  <script>
    (function () {
      try {
        var K = "portfolio-rtl",
          M = 31536000;
        var m = localStorage.getItem(K),
          rtl = false,
          c;
        if (m === "1" || m === "true") rtl = true;
        else if (m === "0") rtl = false;
        else if (
          (c = document.cookie.match(
            /(?:^|;\s*)portfolio-rtl=(0|1|true)(?:;|$)/i,
          ))
        )
          rtl = c[1] === "1" || c[1] === "true";
        document.documentElement.setAttribute("dir", rtl ? "rtl" : "ltr");
        document.documentElement.classList.toggle("rtl-mode", rtl);
        if (m === "1" || m === "true" || m === "0") {
          document.cookie =
            K +
            "=" +
            (rtl ? "1" : "0") +
            ";path=/;max-age=" +
            M +
            ";SameSite=Lax";
        }
      } catch (e) { }
    })();
  </script>
